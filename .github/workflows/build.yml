name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle 8.0
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.0-bin.zip
        unzip -q gradle-8.0-bin.zip
        echo "$PWD/gradle-8.0/bin" >> $GITHUB_PATH

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.0

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build APK
      run: ./gradlew assembleRelease --no-daemon

    - name: Sign APK with Debug Key
      run: |
        # Generate a debug keystore
        keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
          -keyalg RSA -keysize 2048 -validity 10000 -storepass android \
          -keypass android -dname "CN=Android Debug,O=Android,C=US"
        
        # Sign the APK
        $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks debug.keystore \
          --ks-key-alias androiddebugkey --ks-pass pass:android \
          --key-pass pass:android --out app/build/outputs/apk/release/app-release-signed.apk \
          app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: gwtv-launcher-apk
        path: app/build/outputs/apk/release/app-release-signed.apk
